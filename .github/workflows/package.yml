name: Package Don's Notes for iPhone

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package iOS project
        run: |
          mkdir -p release
          # Create a clean zip of the iOS Xcode project and source files
          cd donsnotes-ios/XcodeProject
          zip -r ../../release/DonsNotes-XcodeProject.zip DonsNotes.xcodeproj DonsNotes/
          cd ../..

      - name: Upload iOS project
        uses: actions/upload-artifact@v4
        with:
          name: DonsNotes-XcodeProject
          path: release/DonsNotes-XcodeProject.zip

      - name: Package Android project
        run: |
          zip -r release/DonsNotes-Android.zip donsnotes-android/

      - name: Upload Android project
        uses: actions/upload-artifact@v4
        with:
          name: DonsNotes-Android
          path: release/DonsNotes-Android.zip