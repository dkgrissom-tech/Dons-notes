name: Deploy to TestFlight
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Install Fastlane and dependencies
        run: |
          gem install fastlane -v 2.220.0
          gem install multi_json
          gem install spaceship

      - name: Set up App Store Connect API Key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY }}" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8

      - name: Build and sign app
        working-directory: donsnotes-ios/MinimalProject
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_BUNDLE_ID: ${{ secrets.APP_BUNDLE_ID }}
        run: |
          fastlane run app_store_connect_api_key             key_id:"$APP_STORE_CONNECT_API_KEY_ID"             issuer_id:"$APP_STORE_CONNECT_ISSUER_ID"             key_filepath:"$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"             in_house:false
          
          fastlane run sync_code_signing             type:"appstore"             app_identifier:"$APP_BUNDLE_ID"             team_id:"$APPLE_TEAM_ID"             readonly:false
          
          fastlane run build_app             scheme:"DonsNotes"             project:"DonsNotes.xcodeproj"             configuration:"Release"             export_method:"app-store"             output_directory:"./build"

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          fastlane run upload_to_testflight             ipa:"donsnotes-ios/MinimalProject/build/DonsNotes.ipa"             api_key_path:"$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"             skip_waiting_for_build_processing:true
