name: Build .ipa
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          cd donsnotes-ios/MinimalProject
          xcodebuild -project DonsNotes.xcodeproj -scheme DonsNotes -sdk iphoneos CODE_SIGNING_ALLOWED=NO
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/DonsNotes.app Payload/
          zip -r ../../DonsNotes.ipa Payload
      - uses: actions/upload-artifact@v4
        with:
          name: DonsNotes-iPhone
          path: DonsNotes.ipa
