name: Package Don's Notes

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package Xcode project
        run: |
          cd donsnotes-ios/XcodeProject
          zip -r ../../DonsNotes-Xcode.zip DonsNotes.xcodeproj DonsNotes/
          cd ../DonsNotes
          zip -r ../../DonsNotes-Sources.zip Sources/ Info.plist Resources/

      - name: Upload Xcode project
        uses: actions/upload-artifact@v4
        with:
          name: DonsNotes-iPhone
          path: |
            DonsNotes-Xcode.zip
            DonsNotes-Sources.zip

      - name: Package Android project
        run: zip -r DonsNotes-Android.zip donsnotes-android/

      - name: Upload Android
        uses: actions/upload-artifact@v4
        with:
          name: DonsNotes-Android
          path: DonsNotes-Android.zip