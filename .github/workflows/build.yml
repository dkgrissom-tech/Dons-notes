name: Deploy to TestFlight
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: macos-15
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: donsnotes-ios/MinimalProject

      - name: Set up App Store Connect API Key file
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          printf "%s" "${{ secrets.APP_STORE_CONNECT_API_KEY }}" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8

      - name: Generate App Store Connect JWT
        id: asc_jwt
        run: |
          python3 -m venv /tmp/asc_venv
          /tmp/asc_venv/bin/pip install PyJWT cryptography -q
          /tmp/asc_venv/bin/python3 << 'PYEOF'
          import jwt, time, os
          key_id = "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}"
          issuer_id = "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"
          key_path = os.path.expanduser(f"~/.appstoreconnect/private_keys/AuthKey_{key_id}.p8")
          with open(key_path) as f:
              private_key = f.read()
          now = int(time.time())
          payload = {"iss": issuer_id, "iat": now, "exp": now + 1200, "aud": "appstoreconnect-v1"}
          token = jwt.encode(payload, private_key, algorithm="ES256", headers={"kid": key_id})
          # Write to env file for subsequent steps
          with open(os.environ["GITHUB_ENV"], "a") as env_file:
              env_file.write(f"ASC_JWT={token}\n")
          print("JWT generated successfully.")
          PYEOF

      - name: Import distribution certificate and provisioning profile
        run: |
          # Create a temporary keychain
          security create-keychain -p "ci_keychain_pass" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "ci_keychain_pass" build.keychain
          security set-keychain-settings -t 3600 -l build.keychain

          # Import the distribution certificate (includes private key)
          echo "${{ secrets.DISTRIBUTION_CERTIFICATE_P12 }}" | base64 --decode > /tmp/distribution.p12
          security import /tmp/distribution.p12 \
            -k build.keychain \
            -P "${{ secrets.DISTRIBUTION_CERTIFICATE_PASSWORD }}" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild \
            -A
          
          # Allow codesign/xcodebuild access without UI prompt
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "ci_keychain_pass" \
            build.keychain

          # Verify the certificate is available
          echo "=== Certificates in keychain ==="
          security find-identity -v -p codesigning build.keychain

          # Install provisioning profile in BOTH possible locations
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          mkdir -p ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles
          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/match_AppStore_com.donsnotes.app.mobileprovision
          cp ~/Library/MobileDevice/Provisioning\ Profiles/match_AppStore_com.donsnotes.app.mobileprovision ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles/match_AppStore_com.donsnotes.app.mobileprovision
          
          echo "=== Installed profiles ==="
          ls ~/Library/MobileDevice/Provisioning\ Profiles/
          ls ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles/ 2>/dev/null || echo "Xcode dir not found"

      - name: Run Fastlane beta lane
        working-directory: donsnotes-ios/MinimalProject
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ASC_JWT: ${{ env.ASC_JWT }}
        run: bundle exec fastlane beta

  # ─────────────────────────────────────────────────────────────────────────────
  # App Store submission — triggers ONLY on release tags (v*.*.*-release)
  # Usage: git tag v1.5.0-release && git push origin v1.5.0-release
  # ─────────────────────────────────────────────────────────────────────────────
  submit-appstore:
    if: startsWith(github.ref, 'refs/tags/') && endsWith(github.ref, '-release')
    runs-on: macos-15
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: donsnotes-ios/MinimalProject

      - name: Set up App Store Connect API Key file
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          printf "%s" "${{ secrets.APP_STORE_CONNECT_API_KEY }}" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8

      - name: Import distribution certificate and provisioning profile
        run: |
          security create-keychain -p "ci_keychain_pass" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "ci_keychain_pass" build.keychain
          security set-keychain-settings -t 3600 -l build.keychain

          echo "${{ secrets.DISTRIBUTION_CERTIFICATE_P12 }}" | base64 --decode > /tmp/distribution.p12
          security import /tmp/distribution.p12 \
            -k build.keychain \
            -P "${{ secrets.DISTRIBUTION_CERTIFICATE_PASSWORD }}" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild \
            -A
          
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "ci_keychain_pass" \
            build.keychain

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          mkdir -p ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles
          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/match_AppStore_com.donsnotes.app.mobileprovision
          cp ~/Library/MobileDevice/Provisioning\ Profiles/match_AppStore_com.donsnotes.app.mobileprovision ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles/match_AppStore_com.donsnotes.app.mobileprovision

      - name: Run Fastlane appstore lane
        working-directory: donsnotes-ios/MinimalProject
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_BUNDLE_ID: ${{ secrets.APP_BUNDLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: bundle exec fastlane release
