name: Build Don's Notes for iPhone

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build the app
        run: |
          cd XcodeProject
          xcodebuild -project DonsNotes.xcodeproj \
            -scheme DonsNotes \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath ../build \
            CODE_SIGNING_ALLOWED=NO

      - name: Create .ipa file
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/DonsNotes.app Payload/
          zip -r DonsNotes.ipa Payload

      - name: Upload .ipa
        uses: actions/upload-artifact@v4
        with:
          name: DonsNotes-iPhone
          path: DonsNotes.ipa